{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-panel" style="max-width: 520px;">
    <div class="auth-header">
      <h1>Create Account</h1>
      <p>Join Favourite Books and start shopping</p>
    </div>
    <div class="auth-card">
      <form method="POST" action="{{ url_for('register') }}" novalidate>
        <div class="form-group">
          <label class="form-label" for="name">Full Name <span style="color:var(--danger)">*</span></label>
          <input type="text" id="name" name="name" class="form-control"
                 placeholder="Jane Smith" required minlength="2" maxlength="100"
                 value="{{ form_data.get('name', '') }}">
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email Address <span style="color:var(--danger)">*</span></label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="you@example.com" required
                 value="{{ form_data.get('email', '') }}">
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" class="form-control"
                 placeholder="0400 000 000" maxlength="15"
                 value="{{ form_data.get('phone', '') }}">
        </div>
        <div class="form-group">
          <label class="form-label" for="address">Delivery Address</label>
          <input type="text" id="address" name="address" class="form-control"
                 placeholder="123 Example St, Melbourne VIC 3000" maxlength="200"
                 value="{{ form_data.get('address', '') }}">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password <span style="color:var(--danger)">*</span></label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="••••••••" required minlength="8">
          <p class="form-hint">8+ characters, at least one uppercase letter, number, and special character</p>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm Password <span style="color:var(--danger)">*</span></label>
          <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                 placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-1">Create Account</button>
      </form>
      <div class="text-center mt-2">
        <p class="text-muted text-small">Already have an account?
          <a href="{{ url_for('login') }}">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
